name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Build — verify the workspace compiles in release mode
  # ============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libssl-dev \
            cmake \
            clang

      - name: Build workspace (release)
        run: cargo build --workspace --release

  # ============================================================================
  # Clippy — zero warnings allowed
  # ============================================================================
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev cmake clang

      - name: Run Clippy (deny all warnings)
        run: cargo clippy --workspace -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ============================================================================
  # Test — all workspace tests must pass
  # ============================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev cmake clang

      - name: Run all tests
        run: cargo test --workspace -- --nocapture

      - name: Run scale test
        run: |
          cargo test --package phantom-mcp \
            test_1000_concurrent_sessions_scale \
            -- --nocapture --ignored || \
          cargo test --package phantom-mcp \
            test_1000_concurrent_sessions_scale \
            -- --nocapture

      - name: Run security audit tests
        run: |
          cargo test --package phantom-mcp \
            -- --nocapture \
            test_session_storage_isolation \
            test_path_traversal_rejection \
            test_valid_uuid_accepted \
            test_session_id_uniqueness \
            test_resource_budget_exists_per_session \
            test_circuit_breaker_opens_on_failure

  # ============================================================================
  # Docker — verify the image builds successfully
  # ============================================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [clippy, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: phantom-engine:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
